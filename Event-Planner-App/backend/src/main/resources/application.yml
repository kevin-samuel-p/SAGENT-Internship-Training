spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/event_planning_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
  web:
    resources:
      add-mappings: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: mySuperSecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:180}